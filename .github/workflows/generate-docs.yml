name: Regenerate Module Docs

on:
  repository_dispatch:
    types: [flyto-core-updated, flyto-i18n-updated]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Clone flyto-core
        uses: actions/checkout@v7
        with:
          repository: flytohub/flyto-core
          path: _flyto-core

      - name: Clone flyto-i18n
        uses: actions/checkout@v7
        with:
          repository: flytohub/flyto-i18n
          path: _flyto-i18n

      - name: Install flyto-core dependencies
        run: pip install -e ./_flyto-core

      - name: Generate module docs
        env:
          FLYTO_CORE_PATH: ${{ github.workspace }}/_flyto-core
          FLYTO_I18N_PATH: ${{ github.workspace }}/_flyto-i18n
        run: |
          python scripts/generate-docs.py --all-locales

      - name: Sync source-backed references
        env:
          FLYTO2_I18N_SEO_MANIFEST: ${{ github.workspace }}/_flyto-i18n/dist/seo-manifest.json
        run: |
          python scripts/sync-core-reference.py --core-path _flyto-core
          node scripts/sync-i18n-seo-manifest.mjs
          python scripts/generate-code-reference.py
          python scripts/check-documentation.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "noreply@flyto2.com"
          git add modules/ zh-TW/ ja/ ko/ fr/ es/ de/ pt-BR/ hi/ vi/ id/ th/ tr/ pl/ it/ core/ reference/docs-code.md .seo/i18n-seo-manifest.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs: regenerate module pages from flyto-core + flyto-i18n"
            git push
          fi
