name: SEO Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '23 4 * * 1'

concurrency:
  group: seo-${{ github.ref }}
  cancel-in-progress: true

jobs:
  metadata:
    name: Metadata, sitemap, llms, and Lighthouse
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: npm ci

      - name: Build docs
        run: npm run build

      - name: Check documentation contract
        run: npm run docs:check

      - name: Audit SEO surface
        run: npm run audit:seo

      - name: Lighthouse CI
        run: npx @lhci/cli@0.15.1 autorun --config=./lighthouserc.cjs

  links:
    name: Public link check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: npm ci

      - name: Build docs for clean-url link validation
        run: npm run build

      - name: Check documentation contract
        run: npm run docs:check

      - name: Check internal public links
        run: npm run check:links

      - name: Generate external link manifest
        run: npm run links:external -- .external-links.txt

      - name: Check external public links
        uses: lycheeverse/lychee-action@v2.9.0
        with:
          fail: true
          failIfEmpty: true
          format: markdown
          output: lychee-report.md
          args: >-
            --root-dir .
            --cache
            --max-cache-age 1d
            --max-concurrency 8
            --scheme http
            --scheme https
            --exclude '^https://docs\.flyto2\.com'
            --accept 200,204,206,301,302,307,308,429
            './.external-links.txt'
